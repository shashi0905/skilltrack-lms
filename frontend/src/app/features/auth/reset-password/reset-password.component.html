<div class="reset-password-container">
  <div class="reset-password-card">
    <h1>Create New Password</h1>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-error">
      {{ errorMessage }}
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" *ngIf="token">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          formControlName="newPassword"
          class="form-control"
          [class.invalid]="newPassword?.invalid && newPassword?.touched"
          placeholder="Min 8 characters"
        />
        <div *ngIf="newPassword?.invalid && newPassword?.touched" class="error-message">
          <small *ngIf="newPassword?.errors?.['required']">Password is required</small>
          <small *ngIf="newPassword?.errors?.['minlength']">Minimum 8 characters required</small>
          <small *ngIf="newPassword?.errors?.['passwordStrength']">
            Must include uppercase, lowercase, digit, and special character
          </small>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          class="form-control"
          [class.invalid]="confirmPassword?.invalid && confirmPassword?.touched"
          placeholder="Re-enter password"
        />
        <div *ngIf="resetPasswordForm.errors?.['passwordMismatch'] && confirmPassword?.touched" class="error-message">
          <small>Passwords do not match</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading || resetPasswordForm.invalid">
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading">Resetting...</span>
      </button>
    </form>

    <div class="links">
      <a routerLink="/auth/login">Back to Login</a>
    </div>
  </div>
</div>
